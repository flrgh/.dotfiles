yq = "latest"
zls = "latest"
tombi = "latest"
htmlq = "latest"
yamlfmt = "latest"
claude-code = "latest"
bun = "latest"
"aqua:docker/buildx" = "latest"
"github:docker/docker-language-server" = { version = "latest", bin = "docker-language-server" }
"github:docker/docker-credential-helpers" = { version = "latest", asset_pattern = "docker-credential-secretservice-*linux-amd64", bin = "docker-credential-secretservice" }
"github:AnalogJ/scrutiny" = { version = "latest", asset_pattern = "scrutiny-collector-metrics-linux-amd64", bin = "scrutiny-collector" }
"go:golang.org/x/tools/gopls" = "latest"
"go:github.com/jstemmer/gotags" = "latest"

# with = "latest" mise ends up installing the oldest version, so here we are
"go:code.gitea.io/tea" = "0.14.1"

tmux = "latest"
codex = "latest"
deno = "latest"
age = "latest"
packer = "latest"
opentofu = "latest"
kubectl = "latest"
promtool = "latest"
pnpm = "latest"
action-validator = "latest"
actionlint = "latest"
"npm:@tree-sitter-grammars/tree-sitter-lua" = "latest"
"npm:awk-language-server" = "latest"
"npm:bash-language-server" = "latest"
"npm:gh-actions-language-server" = "latest"
"npm:live-server" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
"npm:pyright" = "latest"
"npm:sql-language-server" = "latest"
"npm:typescript-language-server" = "latest"
"npm:typescript" = "latest"
"npm:vscode-json-languageserver" = "latest"
"npm:yaml-language-server" = "latest"

[settings]
# everything but aqua is disabled until I actually need something from
# another backend
disable_backends = [
    #"aqua",
    "asdf",
    "cargo",
    "conda",
    #"core",
    "dotnet",
    "forgejo",
    "gem",
    #"github",
    #"gitlab",
    #"go",
    #"http",
    "pipx",
    "s3",
    "spm",
    "ubi",
    "vfox",
]
paranoid = true
experimental = true

github_attestations = true
gpg_verify = true

minimum_release_age = "7d"

ceiling_paths = [
    "/home"
]

no_env = true
no_hooks = true
not_found_auto_install = false

trusted_config_paths = [
    "~/git/flrgh"
]

[settings.cargo]
binstall = true

[settings.pipx]
uvx = true

[settings.aqua]
# enable all the security things
slsa = true
cosign = true
minisign = true
github_attestations = true

[settings.node]
gpg_verify = true

[settings.npm]
package_manager = "npm"

[settings.github]
github_attestations = true
slsa = true
credential_command = "secrets get --cache bws://main/github-readonly-pat"
