ast-grep = "latest"
aws-cli = "latest"
bat = "latest"
bazelisk = "latest"
bitwarden = "latest"
cargo-binstall = "latest"
cosign = "latest"
delta = "latest"
direnv = "latest"
fd = "latest"
fzf = "latest"
gh = "latest"
git-cliff = "latest"
jq = "latest"
lsd = "latest"
marksman = "latest"
ninja = "latest"
ripgrep = "latest"
shellcheck = "latest"
