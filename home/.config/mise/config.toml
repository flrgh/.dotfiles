[settings]
# everything but aqua is disabled until I actually need something from
# another backend
disable_backends = [
    #"aqua",
    "asdf",
    "cargo",
    "conda",
    #"core",
    "dotnet",
    "forgejo",
    "gem",
    #"github",
    #"gitlab",
    "go",
    #"http",
    "npm",
    "pipx",
    "s3",
    "spm",
    "ubi",
    "vfox",
]
paranoid = true
experimental = true

github_attestations = true
gpg_verify = true

ceiling_paths = [
    "/home"
]

no_env = true
no_hooks = true
not_found_auto_install = false

[settings.cargo]
binstall = true

[settings.pipx]
uvx = true

[settings.aqua]
# enable all the security things
slsa = true
cosign = true
minisign = true
github_attestations = true

[settings.node]
gpg_verify = true

[settings.github]
github_attestations = true
slsa = true
